	<script>
		function mask(i) {
		   let v = i.value;
		   v = v.replace(/\D/g, "");
		   v = v.replace(/^(\d{2})(\d)/g, "($1) $2"); 
		   v = v.replace(/(\d)(\d{4})$/, "$1-$2");    
		   i.value = v;
		}

		function maskData(i) {
  let v = i.value;
  v = v.replace(/\D/g, "");
  v = v.replace(/^(\d{2})(\d)/, "$1/$2");
  v = v.replace(/^(\d{2})\/(\d{2})(\d)/, "$1/$2/$3");
  i.value = v;
}

function dataValidaBR(str) {
  if (!/^\d{2}\/\d{2}\/\d{4}$/.test(str)) return false;

  const [dd, mm, aaaa] = str.split("/");
  const dia = parseInt(dd, 10);
  const mes = parseInt(mm, 10);
  const ano = parseInt(aaaa, 10);

  const d = new Date(ano, mes - 1, dia);
  return d.getFullYear() === ano && (d.getMonth() + 1) === mes && d.getDate() === dia;
}

function validarDataNascimento(input) {
  const v = input.value.trim();

  // deixa o required cuidar do vazio (se você estiver usando required)
  if (v === "") {
    input.setCustomValidity(""); // sem erro customizado [page:1]
    return;
  }

  if (!dataValidaBR(v)) {
    input.setCustomValidity("Data inválida. Use dd/mm/aaaa."); // [page:1]
  } else {
    input.setCustomValidity(""); // válido [page:1]
  }

  input.reportValidity(); // mostra a mensagem ao sair do campo [page:1]
}
	</script>
